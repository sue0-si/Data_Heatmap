<!-- This uses D3 v7 via ES modules and a single root container. -->
 
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Data Completeness Heatmap</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
      }
      #app {
        display: flex;
        gap: 16px;
      }
      #controls {
        min-width: 220px;
      }
      #heatmap-container {
        flex: 1;
      }
      #dropZone {
        border: 2px dashed #ccc;
        padding: 12px;
        margin-top: 8px;
        text-align: center;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Data Completeness Heatmap</h1>

    <div id="app">
      <div id="controls">
        <div>
          <label>
            Upload CSV dataset:
            <input id="fileInput" type="file" accept=".csv" />
          </label>
          <div id="dropZone">…or drop a CSV file here</div>
          <small>
            Expected: tabular data where each row is a record, each column is a field.
          </small>
        </div>

        <hr/>
        
        <label>
          Filter by type:
          <input id="typeFilter" type="text" placeholder="User, Order, ..." />
        </label>
        <br /><br />
        <label>
          Min completeness (%):
          <input id="minCompleteness" type="number" min="0" max="100" value="0" />
        </label>
      </div>

      <div id="heatmap-container"></div>
    </div>

    <script type="module">
      import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
      import { initApp } from "./src/main.js";

      initApp({ d3 });
    </script>
  </body>
</html>
